name: Release worksheet filter reset

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/release-worksheet-filter-reset.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply worksheet behavior update
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python <<'PY'
          import hashlib
          import re
          from pathlib import Path

          ROOT = Path('.')
          html_paths = [
              ROOT / 'docs/index.html',
              ROOT / 'docs/admin.html',
              ROOT / 'current_release/olympiad_public_readonly.html',
              ROOT / 'current_release/olympiad_taxonomy_prototype.html',
          ]

          old_set = "function setView(v){state.view=v; state.editing=null; render(); window.scrollTo({top:0,behavior:'smooth'});}"
          new_set = "function setView(v){if(v==='worksheets'){enterWorksheets();return;} state.view=v; state.editing=null; if(v!=='problems')state.worksheetMode=false; render(); window.scrollTo({top:0,behavior:'smooth'});}\nfunction enterWorksheets(){resetFilters(); state.worksheetMode=false; state.selectedProblem=null; state.editing=null; state.view='worksheets'; if(!state.worksheetTitle)state.worksheetTitle=worksheetDefaultTitle(); render(); window.scrollTo({top:0,behavior:'smooth'});}"
          start_pattern = re.compile(r"function startWorksheet\(\)\{state\.worksheetMode=true; state\.view='problems'; if\(!state\.worksheetTitle\)state\.worksheetTitle=worksheetDefaultTitle\(\); render\(\); showToast\((.*?)\);\}")

          for path in html_paths:
              text = path.read_text(encoding='utf-8')
              if old_set in text:
                  text = text.replace(old_set, new_set)
              elif 'function enterWorksheets()' not in text:
                  raise SystemExit(f'setView pattern missing in {path}')

              text, count = start_pattern.subn(r"function startWorksheet(){resetFilters(); state.worksheetMode=true; state.selectedProblem=null; state.view='problems'; if(!state.worksheetTitle)state.worksheetTitle=worksheetDefaultTitle(); render(); showToast(\1);}", text)
              if count != 1 and "function startWorksheet(){resetFilters(); state.worksheetMode=true;" not in text:
                  raise SystemExit(f'startWorksheet pattern missing in {path}')

              start = text.find('function worksheetsView')
              end = text.find('function worksheetPrintHtml', start)
              if start < 0 or end < 0:
                  raise SystemExit(f'worksheetsView bounds missing in {path}')
              overview = text[start:end]
              attr = 'data-worksheet-add-filtered="1"'
              if attr in overview:
                  absolute_i = text.find(attr, start)
                  button_start = text.rfind('<button', 0, absolute_i)
                  button_end = text.find('</button>', absolute_i) + len('</button>')
                  removed = text[button_start:button_end]
                  if 'data-start-worksheet' in removed or 'data-worksheet-clear-filtered' in removed:
                      raise SystemExit(f'wrong button span in {path}')
                  text = text[:button_start] + text[button_end:]

              path.write_text(text, encoding='utf-8', newline='\n')

          workflow_path = ROOT / '.github/workflows/release-worksheet-filter-reset.yml'
          if workflow_path.exists():
              workflow_path.unlink()

          def include(path):
              return path.is_file() and '.git' not in path.parts and path.name != 'checksums.sha256'

          lines = []
          for path in sorted(p for p in ROOT.rglob('*') if include(p)):
              rel = path.relative_to(ROOT).as_posix()
              lines.append(f'{hashlib.sha256(path.read_bytes()).hexdigest()}  {rel}')
          (ROOT / 'checksums.sha256').write_text('\n'.join(lines) + '\n', encoding='utf-8', newline='\n')
          print('Applied worksheet filter reset behavior')
          PY
      - name: Verify static bundle
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/verify_static_bundle.py
      - name: Verify worksheet behavior patch
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python <<'PY'
          from pathlib import Path
          issues = []
          for rel in ['docs/index.html','docs/admin.html','current_release/olympiad_public_readonly.html','current_release/olympiad_taxonomy_prototype.html']:
              text = Path(rel).read_text(encoding='utf-8')
              start = text.find('function worksheetsView')
              end = text.find('function worksheetPrintHtml', start)
              overview = text[start:end]
              toolbar = text[text.find('function worksheetToolbar'):text.find('function worksheetMetaLine')]
              if text.count('function enterWorksheets()') != 1:
                  issues.append((rel, 'enterWorksheets count'))
              if "function startWorksheet(){resetFilters();" not in text:
                  issues.append((rel, 'startWorksheet reset missing'))
              if overview.count('data-worksheet-add-filtered') != 0:
                  issues.append((rel, 'overview add-filtered still present'))
              if toolbar.count('data-worksheet-add-filtered') != 1:
                  issues.append((rel, 'toolbar add-filtered missing'))
          if issues:
              for item in issues:
                  print(item)
              raise SystemExit(1)
          print('Worksheet behavior patch OK')
          PY
      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if [ -n "$(git status --porcelain)" ]; then
            git add checksums.sha256 \
              current_release/olympiad_public_readonly.html \
              current_release/olympiad_taxonomy_prototype.html \
              docs/admin.html \
              docs/index.html \
              .github/workflows/release-worksheet-filter-reset.yml
            git commit -m "Reset filters when opening worksheet tool"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
