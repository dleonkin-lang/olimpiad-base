name: Release German Olympiad figure crops

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/release-mo-figures.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install image tools
        run: python -m pip install --upgrade pillow
      - name: Apply German Olympiad figure crops
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python <<'PY'
          import base64
          import hashlib
          import json
          import re
          from io import BytesIO
          from pathlib import Path

          from PIL import Image, ImageChops

          ROOT = Path('.')
          FIG_DIR = ROOT / 'source_materials' / 'figures'
          FIG_DIR.mkdir(parents=True, exist_ok=True)

          data = json.loads((ROOT / 'docs/data/olympiad_database_full_backup.json').read_text(encoding='utf-8'))
          problems = data['problems']
          by_id = {p['id']: p for p in problems}

          def decode_fig(fig):
              return base64.b64decode(fig['dataUri'].split(',', 1)[1])

          def data_uri(raw):
              return 'data:image/png;base64,' + base64.b64encode(raw).decode('ascii')

          def trim_whitespace(im, pad=4):
              bg = Image.new(im.mode, im.size, im.getpixel((0, 0)))
              diff = ImageChops.difference(im, bg)
              bbox = diff.getbbox()
              if not bbox:
                  return im
              left, top, right, bottom = bbox
              return im.crop((max(0, left - pad), max(0, top - pad), min(im.width, right + pad), min(im.height, bottom + pad)))

          def crop_from_existing(problem_id, fig_index, box, filename, alt, trim=False):
              raw = decode_fig(by_id[problem_id]['figures'][fig_index])
              with Image.open(BytesIO(raw)) as im:
                  out_im = im.convert('RGB').crop(box)
                  if trim:
                      out_im = trim_whitespace(out_im, pad=6)
                  out_path = FIG_DIR / filename
                  out_im.save(out_path, format='PNG')
              raw_out = out_path.read_bytes()
              return {'type': 'image', 'alt': alt, 'dataUri': data_uri(raw_out)}

          updates = {
              'MO-60-2020-21-6-LR2-600634': [crop_from_existing(
                  'MO-60-2020-21-6-LR2-600634', 0, (0, 0, 350, 315),
                  'mo_2020_600634_rectangle_strip.png',
                  'Прямоугольник с отрезанной полоской шириной 5 см',
                  trim=True,
              )],
              'MO-59-2019-20-6-LR1-590631': [crop_from_existing(
                  'MO-59-2019-20-6-LR1-590631', 0, (486, 345, 624, 424),
                  'mo_2019_590631_rectangle_ef.png',
                  'Прямоугольник ABCD, разделённый отрезком EF',
              )],
              'MO-59-2019-20-6-LR1-590632': [crop_from_existing(
                  'MO-59-2019-20-6-LR1-590632', 0, (487, 566, 632, 714),
                  'mo_2019_590632_edge_graph.png',
                  'Объёмное тело с равными рёбрами и вершинами A-I',
              )],
              'MO-61-2021-22-6-RR-610621': [crop_from_existing(
                  'MO-61-2021-22-6-RR-610621', 0, (545, 330, 678, 405),
                  'mo_2021_610621_cryptarithm.png',
                  'Криптарифм BLÜTE + BIENE = HONIG',
              )],
              'MO-61-2021-22-6-RR-610623': [],
              'MO-62-2022-23-6-LR1-620631': [crop_from_existing(
                  'MO-62-2022-23-6-LR1-620631', 0, (440, 354, 666, 560),
                  'mo_2022_620631_number_snake.png',
                  'Числовая змейка на клетчатой сетке',
              )],
              'MO-63-2023-24-6-LR2-630635': [crop_from_existing(
                  'MO-63-2023-24-6-LR2-630635', 0, (548, 496, 686, 706),
                  'mo_2023_630635_cube_stairs.png',
                  'Кубические лестницы с двумя и тремя этажами',
              )],
          }

          for problem_id, figures in updates.items():
              p = by_id[problem_id]
              p.pop('answerFigures', None)
              p.pop('solutionFigures', None)
              if figures:
                  p['figures'] = figures
              else:
                  p.pop('figures', None)

          full_json = json.dumps(data, ensure_ascii=False, indent=2) + '\n'
          problems_json = json.dumps(problems, ensure_ascii=False, indent=2) + '\n'
          compact_data = json.dumps(data, ensure_ascii=False, separators=(',', ':'))

          for rel_path, content in {
              'docs/data/olympiad_database_full_backup.json': full_json,
              'current_release/olympiad_database_full_backup.json': full_json,
              'docs/data/olympiad_problems_237.json': problems_json,
              'current_release/olympiad_problems_237.json': problems_json,
          }.items():
              (ROOT / rel_path).write_text(content, encoding='utf-8', newline='\n')

          for rel_path in ['docs/index.html', 'docs/admin.html', 'current_release/olympiad_public_readonly.html', 'current_release/olympiad_taxonomy_prototype.html']:
              path = ROOT / rel_path
              text = path.read_text(encoding='utf-8')
              text = re.sub(r'const DATA = .*?;\nconst CAN_EDIT', lambda m: 'const DATA = ' + compact_data + ';\nconst CAN_EDIT', text, count=1, flags=re.S)
              path.write_text(text, encoding='utf-8', newline='\n')

          workflow_path = ROOT / '.github/workflows/release-mo-figures.yml'
          if workflow_path.exists():
              workflow_path.unlink()

          def include(path):
              return path.is_file() and '.git' not in path.parts and path.name != 'checksums.sha256'

          lines = []
          for path in sorted(p for p in ROOT.rglob('*') if include(p)):
              rel = path.relative_to(ROOT).as_posix()
              lines.append(f'{hashlib.sha256(path.read_bytes()).hexdigest()}  {rel}')
          (ROOT / 'checksums.sha256').write_text('\n'.join(lines) + '\n', encoding='utf-8', newline='\n')
          print('Applied German Olympiad figure crops')
          PY
      - name: Verify static bundle
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/verify_static_bundle.py
      - name: Verify German Olympiad figures
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python <<'PY'
          import base64
          import json
          from io import BytesIO
          from pathlib import Path
          from PIL import Image

          data = json.loads(Path('docs/data/olympiad_database_full_backup.json').read_text(encoding='utf-8'))
          sources = {s['id']: s for s in data['sources']}
          mo_sources = {sid for sid, s in sources.items() if sid == 'mathematik-olympiade-de' or s.get('parentId') == 'mathematik-olympiade-de'}
          issues = []
          count = 0
          by_id = {p['id']: p for p in data['problems']}
          for p in data['problems']:
              if p.get('sourceId') in mo_sources or str(p.get('id', '')).startswith('MO-'):
                  for field in ['figures', 'answerFigures', 'solutionFigures']:
                      for f in p.get(field, []):
                          count += 1
                          alt = f.get('alt', '').lower()
                          if 'страница' in alt or 'page' in alt:
                              issues.append((p['id'], field, 'page-alt', f.get('alt')))
                          raw = base64.b64decode(f['dataUri'].split(',', 1)[1])
                          im = Image.open(BytesIO(raw))
                          width, height = im.size
                          if width > 400 or height > 400:
                              issues.append((p['id'], field, 'large', f'{width}x{height}', f.get('alt')))
          expected = {
              'MO-60-2020-21-6-LR2-600634': 1,
              'MO-59-2019-20-6-LR1-590631': 1,
              'MO-59-2019-20-6-LR1-590632': 1,
              'MO-61-2021-22-6-RR-610621': 1,
              'MO-61-2021-22-6-RR-610623': 0,
              'MO-62-2022-23-6-LR1-620631': 1,
              'MO-63-2023-24-6-LR2-630635': 1,
          }
          for pid, n in expected.items():
              got = len(by_id[pid].get('figures', []))
              if got != n:
                  issues.append((pid, 'figure-count', got, n))
          if count != 6:
              issues.append(('mo-total-figures', count, 6))
          if len(data['problems']) != 237 or len(data.get('sources', [])) != 51:
              issues.append(('database-counts', len(data['problems']), len(data.get('sources', []))))
          if issues:
              for item in issues:
                  print(item)
              raise SystemExit(1)
          print('German Olympiad figure crops OK')
          PY
      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if [ -n "$(git status --porcelain)" ]; then
            git add checksums.sha256 \
              current_release/olympiad_database_full_backup.json \
              current_release/olympiad_problems_237.json \
              current_release/olympiad_public_readonly.html \
              current_release/olympiad_taxonomy_prototype.html \
              docs/admin.html \
              docs/data/olympiad_database_full_backup.json \
              docs/data/olympiad_problems_237.json \
              docs/index.html \
              source_materials/figures/mo_2019_590631_rectangle_ef.png \
              source_materials/figures/mo_2019_590632_edge_graph.png \
              source_materials/figures/mo_2020_600634_rectangle_strip.png \
              source_materials/figures/mo_2021_610621_cryptarithm.png \
              source_materials/figures/mo_2022_620631_number_snake.png \
              source_materials/figures/mo_2023_630635_cube_stairs.png \
              .github/workflows/release-mo-figures.yml
            git commit -m "Crop German Olympiad statement figures"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
