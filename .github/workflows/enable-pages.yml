name: Enable GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  enable:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/$REPO/pages"
          headers=(
            -H "Authorization: Bearer $GH_TOKEN"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          payload='{"build_type":"legacy","source":{"branch":"main","path":"/docs"}}'
          status=$(curl -sS -o "$RUNNER_TEMP/pages-get.json" -w "%{http_code}" "${headers[@]}" "$api")
          if [ "$status" = "200" ]; then
            curl -sS --fail -X PATCH "${headers[@]}" -d "$payload" "$api"
          elif [ "$status" = "404" ]; then
            curl -sS --fail -X POST "${headers[@]}" -d "$payload" "$api"
          else
            cat "$RUNNER_TEMP/pages-get.json"
            echo "Unexpected Pages API status: $status" >&2
            exit 1
          fi

      - name: Remove temporary workflow
        run: |
          set -euo pipefail
          rm -f .github/workflows/enable-pages.yml
          rmdir .github/workflows .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove temporary Pages setup workflow"
          git push
