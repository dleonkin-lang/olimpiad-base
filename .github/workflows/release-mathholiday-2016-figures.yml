name: Release Math Holiday 2016 figures

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/release-mathholiday-2016-figures.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install image tools
        run: python -m pip install --upgrade pillow
      - name: Apply release transform
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python <<'PY'
          import base64
          import hashlib
          import io
          import json
          from pathlib import Path
          from PIL import Image

          ROOT = Path('.')
          FULL_BACKUP_PATHS = [
              ROOT / 'docs/data/olympiad_database_full_backup.json',
              ROOT / 'current_release/olympiad_database_full_backup.json',
          ]
          PROBLEMS_PATHS = [
              ROOT / 'docs/data/olympiad_problems_237.json',
              ROOT / 'current_release/olympiad_problems_237.json',
          ]
          HTML_PATHS = [
              ROOT / 'docs/index.html',
              ROOT / 'docs/admin.html',
              ROOT / 'current_release/olympiad_public_readonly.html',
              ROOT / 'current_release/olympiad_taxonomy_prototype.html',
          ]
          FIGURE_DIR = ROOT / 'source_materials/figures'
          FIGURE_DIR.mkdir(parents=True, exist_ok=True)

          base_data = json.loads(FULL_BACKUP_PATHS[0].read_text(encoding='utf-8'))
          problems_by_id = {problem['id']: problem for problem in base_data['problems']}

          def crop_from_problem(problem_id, figure_index, box, output_name):
              figure = problems_by_id[problem_id]['figures'][figure_index]
              encoded = figure['dataUri'].split(',', 1)[1]
              image = Image.open(io.BytesIO(base64.b64decode(encoded))).convert('RGBA')
              cropped = image.crop(box)
              buffer = io.BytesIO()
              cropped.save(buffer, format='PNG', optimize=True)
              payload = buffer.getvalue()
              (FIGURE_DIR / output_name).write_bytes(payload)
              return 'data:image/png;base64,' + base64.b64encode(payload).decode('ascii')

          ring_uri = crop_from_problem('MP-2016-6-2', 1, (225, 126, 472, 312), 'mp_2016_6_2_ring_diagram.png')
          grid_uri = crop_from_problem('MP-2016-6-2', 1, (215, 690, 468, 850), 'mp_2016_6_3_triangle_grid.png')
          colored_uri = crop_from_problem('MP-2016-6-3', 1, (215, 100, 468, 268), 'mp_2016_6_3_colored_example.png')

          replacement_figures = {
              'MP-2016-6-1': [],
              'MP-2016-6-2': [{
                  'type': 'image',
                  'alt': 'Схема кольцевой трамвайной линии с остановками Цирк, Парк и Зоопарк',
                  'dataUri': ring_uri,
              }],
              'MP-2016-6-3': [
                  {
                      'type': 'image',
                      'alt': 'Треугольная сетка со стороной 8',
                      'dataUri': grid_uri,
                  },
                  {
                      'type': 'image',
                      'alt': 'Официальный пример закраски 15 треугольничков',
                      'dataUri': colored_uri,
                  },
              ],
              'MP-2016-6-4': [],
              'MP-2016-6-5': [],
              'MP-2016-6-6': [],
          }

          def update_problem_figures(data):
              seen = set()
              for problem in data['problems']:
                  problem_id = problem.get('id')
                  if problem_id in replacement_figures:
                      problem['figures'] = replacement_figures[problem_id]
                      seen.add(problem_id)
              missing = set(replacement_figures) - seen
              if missing:
                  raise RuntimeError(f'Missing problems: {sorted(missing)}')

          update_problem_figures(base_data)
          for path in FULL_BACKUP_PATHS:
              data = json.loads(path.read_text(encoding='utf-8'))
              update_problem_figures(data)
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8', newline='\n')

          by_id = {problem['id']: problem for problem in base_data['problems']}
          for path in PROBLEMS_PATHS:
              data = json.loads(path.read_text(encoding='utf-8'))
              updated = [by_id[problem['id']] for problem in data]
              path.write_text(json.dumps(updated, ensure_ascii=False, indent=2) + '\n', encoding='utf-8', newline='\n')

          minified_data = json.dumps(base_data, ensure_ascii=False, separators=(',', ':'))
          for path in HTML_PATHS:
              html = path.read_text(encoding='utf-8')
              marker = 'const DATA = '
              start = html.index(marker) + len(marker)
              end = html.index(';\nconst CAN_EDIT', start)
              path.write_text(html[:start] + minified_data + html[end:], encoding='utf-8', newline='\n')

          workflow_path = ROOT / '.github/workflows/release-mathholiday-2016-figures.yml'
          if workflow_path.exists():
              workflow_path.unlink()

          checksum_rows = []
          for path in sorted(p for p in ROOT.rglob('*') if p.is_file() and p.name != 'checksums.sha256' and '.git' not in p.parts):
              rel = path.relative_to(ROOT).as_posix()
              checksum_rows.append(f'{hashlib.sha256(path.read_bytes()).hexdigest()}  {rel}')
          (ROOT / 'checksums.sha256').write_text('\n'.join(checksum_rows) + '\n', encoding='utf-8', newline='\n')

          for problem in base_data['problems']:
              if problem.get('id', '').startswith('MP-2016-6-'):
                  print(problem['id'], len(problem.get('figures', [])))
          PY
      - name: Verify static bundle
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/verify_static_bundle.py
      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if [ -n "$(git status --porcelain)" ]; then
            git add checksums.sha256 \
              current_release/olympiad_database_full_backup.json \
              current_release/olympiad_problems_237.json \
              current_release/olympiad_public_readonly.html \
              current_release/olympiad_taxonomy_prototype.html \
              docs/admin.html \
              docs/data/olympiad_database_full_backup.json \
              docs/data/olympiad_problems_237.json \
              docs/index.html \
              source_materials/figures/mp_2016_6_2_ring_diagram.png \
              source_materials/figures/mp_2016_6_3_colored_example.png \
              source_materials/figures/mp_2016_6_3_triangle_grid.png \
              .github/workflows/release-mathholiday-2016-figures.yml
            git commit -m "Fix Math Holiday 2016 figures"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
