name: Codex worksheet TeX patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/codex-tex-download.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch worksheet TeX export
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          def replace_once(text, old, new, label):
              if old in text:
                  return text.replace(old, new, 1)
              if new in text:
                  return text
              raise SystemExit(f'Missing patch target: {label}')

          def write_if_changed(path, text):
              p = Path(path)
              old = p.read_text(encoding='utf-8')
              if old != text:
                  p.write_text(text, encoding='utf-8')

          app_path = Path('server/tex-pdf-service/app.py')
          app = app_path.read_text(encoding='utf-8')
          replacements = [
              (
                  'caption_tex = f"\\n{{\\\\footnotesize {caption}\\\\par}}" if caption else ""',
                  'caption_tex = f"\\n{{\\\\footnotesize\\\\itshape {caption}\\\\par}}" if caption else ""',
                  'figure caption style',
              ),
              (
                  '            "\\\\begin{center}\\n"\n            f"\\\\includegraphics[width=0.92\\\\linewidth,height=0.34\\\\textheight,keepaspectratio]{{{filename}}}"\n            f"{caption_tex}\\n"\n            "\\\\end{center}\\n"',
                  '            "\\\\begin{center}\\n"\n            f"% Image file is generated by the PDF service from the worksheet payload.\\n"\n            f"\\\\includegraphics[width=0.78\\\\linewidth,height=0.30\\\\textheight,keepaspectratio]{{{filename}}}"\n            f"{caption_tex}\\n"\n            "\\\\end{center}\\n"',
                  'figure block width',
              ),
              (
                  '        "\\\\vspace{2mm}\\n"\n        f"\\\\noindent\\\\fbox{{\\\\parbox[c][{heights[space]}][t]{{0.96\\\\linewidth}}{{\\\\strut}}}}\\n"',
                  '        "\\\\par\\\\vspace{2mm}\\n"\n        f"\\\\noindent\\\\rule{{\\\\linewidth}}{{0.2pt}}\\\\par\\\\vspace{{{heights[space]}}}\\n"',
                  'workspace block',
              ),
              (
                  '        "\\\\Needspace{9\\\\baselineskip}\\n",\n        f"\\\\subsection*{{{number}. {title}}}\\n",',
                  '        "\\\\Needspace{8\\\\baselineskip}\\n",\n        f"\\\\problem{{{number}}}{{{title}}}\\n",',
                  'problem heading',
              ),
              (
                  'body.append(f"{{\\\\footnotesize\\\\color{{gray}} {meta}\\\\par}}\\n")',
                  'body.append(f"{{\\\\footnotesize\\\\itshape {meta}\\\\par}}\\n")',
                  'meta style',
              ),
              (
                  'body.append(f"{{\\\\footnotesize\\\\color{{gray}} {source}\\\\par}}\\n")',
                  'body.append(f"{{\\\\footnotesize\\\\itshape {source}\\\\par}}\\n")',
                  'source style',
              ),
              (
                  'body.append(f"{{\\\\scriptsize\\\\color{{gray}} {tags}\\\\par}}\\n")',
                  'body.append(f"{{\\\\scriptsize\\\\itshape {tags}\\\\par}}\\n")',
                  'tag style',
              ),
              (
                  'body.append("\\\\paragraph{Ответ.}\\n")',
                  'body.append("\\\\answerheading\\n")',
                  'answer heading',
              ),
              (
                  'body.append("\\\\paragraph{Решение.}\\n")',
                  'body.append("\\\\solutionheading\\n")',
                  'solution heading',
              ),
              (
                  'subtitle_tex = f"{{\\\\large\\\\color{{gray}} {subtitle}\\\\par}}" if subtitle else ""',
                  'subtitle_tex = f"{{\\\\centering\\\\large {subtitle}\\\\par}}" if subtitle else ""',
                  'subtitle style',
              ),
              (
                  '\\usepackage[a4paper,margin=16mm]{{geometry}}',
                  '\\usepackage[a4paper,left=18mm,right=18mm,top=16mm,bottom=18mm]{{geometry}}',
                  'geometry',
              ),
              (
                  '\\usepackage{{xcolor}}\n',
                  '',
                  'remove xcolor',
              ),
              (
                  '\\setlength{{\\parskip}}{{5pt}}',
                  '\\setlength{{\\parskip}}{{0.55em}}\n\\setlength{{\\columnsep}}{{9mm}}',
                  'paragraph spacing',
              ),
              (
                  '\\setlist{{nosep}}\n\\begin{{document}}',
                  '\\setlist{{nosep}}\n\\newcommand{{\\problem}}[2]{{%\n  \\par\\medskip\n  \\noindent\\textbf{{Задача #1.}}\\quad\\textbf{{#2}}\\par\\nobreak\n}}\n\\newcommand{{\\answerheading}}{{\\par\\smallskip\\noindent\\textit{{Ответ.}}\\quad}}\n\\newcommand{{\\solutionheading}}{{\\par\\smallskip\\noindent\\textit{{Решение.}}\\quad}}\n\\begin{{document}}',
                  'classic macros',
              ),
              (
                  '{{\\LARGE\\bfseries {title}\\par}}\n{subtitle_tex}\n\\vspace{{5mm}}',
                  '{{\\centering\\LARGE\\bfseries {title}\\par}}\n{subtitle_tex}\n\\vspace{{2mm}}\n\\hrule\n\\vspace{{5mm}}',
                  'title block',
              ),
          ]
          for old, new, label in replacements:
              app = replace_once(app, old, new, label)
          pdf_tail_old = '''@app.post("/build-pdf")
def build_pdf(request: BuildPdfRequest) -> Response:
    safe_problem_limit(request.problems)
    with tempfile.TemporaryDirectory(prefix="worksheet-pdf-") as tmp:
        temp_dir = Path(tmp)
        tex_source = render_tex(temp_dir, request)
        pdf = compile_pdf(tex_source, temp_dir)
    return Response(
        content=pdf,
        media_type="application/pdf",
        headers={"Content-Disposition": 'attachment; filename="worksheet.pdf"'},
    )'''
          pdf_tail_new = '''@app.post("/build-pdf")
def build_pdf(request: BuildPdfRequest) -> Response:
    safe_problem_limit(request.problems)
    with tempfile.TemporaryDirectory(prefix="worksheet-pdf-") as tmp:
        temp_dir = Path(tmp)
        tex_source = render_tex(temp_dir, request)
        pdf = compile_pdf(tex_source, temp_dir)
    return Response(
        content=pdf,
        media_type="application/pdf",
        headers={"Content-Disposition": 'attachment; filename="worksheet.pdf"'},
    )


@app.post("/build-tex")
def build_tex(request: BuildPdfRequest) -> Response:
    safe_problem_limit(request.problems)
    with tempfile.TemporaryDirectory(prefix="worksheet-tex-") as tmp:
        temp_dir = Path(tmp)
        tex_source = render_tex(temp_dir, request)
    return Response(
        content=tex_source,
        media_type="application/x-tex; charset=utf-8",
        headers={"Content-Disposition": 'attachment; filename="worksheet.tex"'},
    )'''
          app = replace_once(app, pdf_tail_old, pdf_tail_new, 'build-tex endpoint')
          write_if_changed(app_path, app)

          html_files = [
              Path('docs/index.html'),
              Path('docs/admin.html'),
              Path('current_release/olympiad_public_readonly.html'),
              Path('current_release/olympiad_taxonomy_prototype.html'),
          ]
          settings_old = r'<button class="btn primary" data-worksheet-download-pdf="1">\u0421\u043a\u0430\u0447\u0430\u0442\u044c PDF \u0447\u0435\u0440\u0435\u0437 TeX</button><button class="btn" data-worksheet-download-html="1">'
          settings_new = r'<button class="btn primary" data-worksheet-download-pdf="1">\u0421\u043a\u0430\u0447\u0430\u0442\u044c PDF \u0447\u0435\u0440\u0435\u0437 TeX</button><button class="btn" data-worksheet-download-tex="1">\u0421\u043a\u0430\u0447\u0430\u0442\u044c TeX</button><button class="btn" data-worksheet-download-html="1">'
          preview_old = r'<button class="btn primary" data-worksheet-download-pdf="1">PDF \u0447\u0435\u0440\u0435\u0437 TeX</button></div></div><div id="worksheetPreview"'
          preview_new = r'<button class="btn primary" data-worksheet-download-pdf="1">PDF \u0447\u0435\u0440\u0435\u0437 TeX</button><button class="btn" data-worksheet-download-tex="1">TeX</button></div></div><div id="worksheetPreview"'
          tex_fn = r'''async function worksheetDownloadTex(){if(!worksheetProblems().length){alert('\u0421\u043d\u0430\u0447\u0430\u043b\u0430 \u0432\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u0445\u043e\u0442\u044f \u0431\u044b \u043e\u0434\u043d\u0443 \u0437\u0430\u0434\u0430\u0447\u0443.'); return;} let api=worksheetPdfApiUrl(); if(!api){const next=prompt('\u0410\u0434\u0440\u0435\u0441 PDF-\u0441\u0435\u0440\u0432\u0435\u0440\u0430 Cloud Run',''); if(next===null)return; worksheetSetPdfApiUrl(next); api=worksheetPdfApiUrl();} if(!api){alert('\u0421\u043d\u0430\u0447\u0430\u043b\u0430 \u0443\u043a\u0430\u0436\u0438\u0442\u0435 \u0430\u0434\u0440\u0435\u0441 PDF-\u0441\u0435\u0440\u0432\u0435\u0440\u0430.'); return;} const button=document.querySelector('[data-worksheet-download-tex]'); const oldText=button?button.textContent:''; if(button){button.disabled=true; button.textContent='\u0421\u043e\u0431\u0438\u0440\u0430\u044e TeX...';} try{const res=await fetch(api.replace(/\/+$/,'')+'/build-tex',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(worksheetPdfPayload())}); if(!res.ok){let msg=await res.text(); throw new Error((msg||('HTTP '+res.status)).slice(0,1200));} const blob=await res.blob(); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=worksheetBaseName()+'.tex'; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},0); showToast('TeX \u0433\u043e\u0442\u043e\u0432');}catch(err){alert('\u041d\u0435 \u0443\u0434\u0430\u043b\u043e\u0441\u044c \u0441\u043a\u0430\u0447\u0430\u0442\u044c TeX: '+(err&&err.message?err.message:err));}finally{if(button){button.disabled=false; button.textContent=oldText||'\u0421\u043a\u0430\u0447\u0430\u0442\u044c TeX';}}}
'''
          click_old = "if(x=e.target.closest('[data-worksheet-download-pdf]')){worksheetDownloadPdf();return;} if(x=e.target.closest('[data-worksheet-pdf-server]')){worksheetConfigurePdfServer();return;}"
          click_new = "if(x=e.target.closest('[data-worksheet-download-pdf]')){worksheetDownloadPdf();return;} if(x=e.target.closest('[data-worksheet-download-tex]')){worksheetDownloadTex();return;} if(x=e.target.closest('[data-worksheet-pdf-server]')){worksheetConfigurePdfServer();return;}"
          for path in html_files:
              text = path.read_text(encoding='utf-8')
              text = replace_once(text, settings_old, settings_new, f'{path} settings button')
              text = replace_once(text, preview_old, preview_new, f'{path} preview button')
              text = replace_once(text, click_old, click_new, f'{path} click handler')
              if 'async function worksheetDownloadTex()' not in text:
                  insert_at = text.find('function worksheetDownloadHtml()')
                  if insert_at < 0:
                      raise SystemExit(f'{path}: missing worksheetDownloadHtml')
                  text = text[:insert_at] + tex_fn + text[insert_at:]
              write_if_changed(path, text)

          readme_path = Path('server/tex-pdf-service/README.md')
          readme = readme_path.read_text(encoding='utf-8')
          readme = replace_once(
              readme,
              'The static site sends structured worksheet JSON to `POST /build-pdf`. The service does not accept raw TeX: it escapes task text, writes selected PNG/JPEG data-URI figures to a temporary directory, generates `worksheet.tex`, and compiles it with `xelatex`.',
              'The static site sends structured worksheet JSON to `POST /build-pdf` or `POST /build-tex`. The service does not accept raw TeX: it escapes task text, writes selected PNG/JPEG data-URI figures to a temporary directory, generates `worksheet.tex`, and either compiles it with `xelatex` or returns the TeX source.',
              'README intro',
          )
          readme = replace_once(
              readme,
              '```bash\ncurl http://localhost:8080/healthz\n```',
              '```bash\ncurl http://localhost:8080/healthz\n```\n\nBuild endpoints:\n\n- `POST /build-pdf` returns `worksheet.pdf`.\n- `POST /build-tex` returns `worksheet.tex`.\n\nThe TeX download is the editable source generated from the same worksheet template. When figures are enabled, the TeX source references generated image filenames; a future TeX bundle export can package those images together with the source.',
              'README endpoints',
          )
          write_if_changed(readme_path, readme)

          doc_path = Path('project_docs/TEX_PDF_SERVER.md')
          doc = doc_path.read_text(encoding='utf-8')
          doc = replace_once(
              doc,
              '3. The server generates a temporary `.tex` file and compiles it with `xelatex`.\n4. The browser receives and downloads `worksheet.pdf`.',
              '3. The server generates a temporary `.tex` file.\n4. For PDF export, the server compiles it with `xelatex` and the browser downloads `worksheet.pdf`.\n5. For TeX export, the browser downloads the generated `worksheet.tex`.',
              'project doc flow',
          )
          doc = replace_once(
              doc,
              'The server does not accept raw TeX. It accepts structured JSON, escapes text, writes selected images to a temporary directory, and compiles the generated TeX. This keeps the public endpoint narrower and safer.',
              'The server does not accept raw TeX. It accepts structured JSON, escapes text, writes selected images to a temporary directory, and then either compiles the generated TeX or returns it as a source file. This keeps the public endpoint narrower and safer.\n\n## Endpoints\n\n- `GET /healthz`: simple health check.\n- `POST /build-pdf`: builds and returns `worksheet.pdf`.\n- `POST /build-tex`: returns the generated `worksheet.tex`.\n\nThe current TeX download is a plain `.tex` file. If figures are enabled, it references the temporary image filenames generated during server-side compilation. A later improvement can add a `.zip` TeX bundle with `worksheet.tex` and image files together.',
              'project doc endpoints',
          )
          write_if_changed(doc_path, doc)

          manifest = Path('checksums.sha256')
          lines = []
          for raw in manifest.read_text(encoding='utf-8').splitlines():
              if not raw.strip():
                  continue
              _, rel = raw.split('  ', 1)
              rel = rel.strip().replace('\\\\', '/')
              path = Path(rel)
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f'{digest}  {rel}')
          manifest.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          Path('.github/workflows/codex-tex-download.yml').unlink(missing_ok=True)
          PY
      - name: Validate bundle
        run: |
          python -m py_compile server/tex-pdf-service/app.py
          PYTHONIOENCODING=utf-8 python tools/verify_static_bundle.py
          python - <<'PY'
          from pathlib import Path
          files = ['docs/index.html','docs/admin.html','current_release/olympiad_public_readonly.html','current_release/olympiad_taxonomy_prototype.html']
          for p in files:
              s = Path(p).read_text(encoding='utf-8')
              assert s.count('data-worksheet-download-tex') == 4, p
              assert s.count('async function worksheetDownloadTex') == 1, p
              assert s.count("'/build-tex'") == 1, p
          print('TeX download markers OK')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add TeX download for worksheets"
            git push
          fi
