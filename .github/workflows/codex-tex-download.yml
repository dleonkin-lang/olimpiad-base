name: Codex worksheet TeX patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/codex-tex-download.yml'
      - 'tools/codex_tex_patch.py'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch worksheet TeX export
        run: python tools/codex_tex_patch.py
      - name: Validate bundle
        run: |
          python -m py_compile server/tex-pdf-service/app.py
          PYTHONIOENCODING=utf-8 python tools/verify_static_bundle.py
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess
          import tempfile

          files = [
              'docs/index.html',
              'docs/admin.html',
              'current_release/olympiad_public_readonly.html',
              'current_release/olympiad_taxonomy_prototype.html',
          ]
          for p in files:
              s = Path(p).read_text(encoding='utf-8')
              assert s.count('data-worksheet-download-tex') == 4, p
              assert s.count('async function worksheetDownloadTex') == 1, p
              assert s.count("'/build-tex'") == 1, p
              scripts = re.findall(r'<script>(.*?)</script>', s, flags=re.S)
              assert scripts, p
              with tempfile.NamedTemporaryFile('w', suffix='.js', encoding='utf-8', delete=False) as tmp:
                  tmp.write('\n'.join(scripts))
                  tmp_path = tmp.name
              subprocess.run(['node', '--check', tmp_path], check=True)
              Path(tmp_path).unlink(missing_ok=True)
          print('TeX download markers and JS syntax OK')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add TeX download for worksheets"
            git push
          fi
